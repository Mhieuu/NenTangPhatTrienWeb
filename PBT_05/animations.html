<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animations Demo</title>
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <main class="demo-shell">
    <section class="section-title">
      <p>Transitions & Animations</p>
      <h1>Hover, zoom, spinner and fade-in</h1>
    </section>

    <section class="cards-grid">
      <article class="demo-card fade-in">
        <div class="image-wrap"><img src="https://placehold.co/600x420" alt="Sample product"></div>
        <div class="card-body">
          <h2>Wireless Headphone</h2>
          <p>Hover card, zoom image and animated CTA.</p>
          <button class="buy-btn">Mua ngay</button>
        </div>
      </article>

      <article class="demo-card fade-in">
        <div class="image-wrap"><img src="https://placehold.co/600x420" alt="Sample product"></div>
        <div class="card-body">
          <h2>Smart Watch</h2>
          <p>Subtle motion creates stronger feedback.</p>
          <button class="buy-btn">Mua ngay</button>
        </div>
      </article>

      <article class="demo-card fade-in">
        <div class="image-wrap"><img src="https://placehold.co/600x420" alt="Sample product"></div>
        <div class="card-body">
          <h2>Bluetooth Speaker</h2>
          <p>Hover states keep the interface alive.</p>
          <button class="buy-btn">Mua ngay</button>
        </div>
      </article>
    </section>

    <section class="loader-panel fade-in">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading products...</p>
    </section>
  </main>
</body>
</html>
