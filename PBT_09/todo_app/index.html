<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel">
      <h1>Todo App</h1>
      <form id="todoForm" class="todo-form">
        <input id="todoInput" type="text" placeholder="Thêm việc cần làm..." aria-label="Todo input">
        <button type="submit">Add</button>
      </form>

      <div class="toolbar">
        <p id="todoCount">0 items left</p>
        <div class="filters" role="tablist" aria-label="Todo filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="active">Active</button>
          <button data-filter="completed">Completed</button>
        </div>
        <button id="clearCompleted" class="ghost">Clear completed</button>
      </div>

      <ul id="todoList" class="todo-list"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
