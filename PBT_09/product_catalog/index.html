<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Catalog</h1>
    <div class="actions">
      <button id="themeToggle" aria-label="Toggle dark mode">Dark mode</button>
      <div class="cart-badge" aria-label="Cart items">🛒 <span id="cartCount">0</span></div>
    </div>
  </header>

  <main class="catalog-shell">
    <section class="controls">
      <input id="searchInput" type="search" placeholder="Tìm sản phẩm..." aria-label="Search products">
      <div id="categoryButtons" class="category-buttons"></div>
      <select id="sortSelect">
        <option value="featured">Sắp xếp</option>
        <option value="price-asc">Giá tăng</option>
        <option value="price-desc">Giá giảm</option>
        <option value="name-asc">Tên A-Z</option>
        <option value="rating-desc">Đánh giá cao nhất</option>
      </select>
    </section>

    <section id="productGrid" class="product-grid" aria-live="polite"></section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Close modal">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
