<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi API Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>API Dashboard</h1>
        <p id="timeInfo">Ready</p>
      </div>
      <button id="refreshBtn">Refresh All</button>
    </header>
    <section class="grid">
      <article class="widget" id="usersWidget"><h2>Users</h2><div class="body">Loading...</div></article>
      <article class="widget" id="weatherWidget"><h2>Weather</h2><div class="body">Loading...</div></article>
      <article class="widget" id="countryWidget"><h2>Country</h2><div class="body">Loading...</div></article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
