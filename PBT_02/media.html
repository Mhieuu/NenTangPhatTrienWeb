<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Media — Sản phẩm</title>
  <style>img{max-width:100%;height:auto}</style>
</head>
<body>
  <h1>Media Page — Sản phẩm</h1>

  <section>
    <figure>
      <img src="https://via.placeholder.com/400x300.png?text=Product+1" alt="iPhone 16 Pro Max 256GB Titan" loading="lazy">
      <figcaption>iPhone 16 Pro Max — 25.990.000đ</figcaption>
    </figure>

    <figure>
      <img src="https://via.placeholder.com/400x300.png?text=Product+2" alt="Tai nghe không dây màu đen" loading="lazy">
      <figcaption>Tai nghe Bluetooth — 1.290.000đ</figcaption>
    </figure>

    <figure>
      <img src="https://via.placeholder.com/400x300.png?text=Decor" alt="" loading="lazy">
      <figcaption>Ảnh trang trí</figcaption>
    </figure>
  </section>

  <h2>YouTube embed</h2>
  <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" allowfullscreen></iframe>

  <h2>Native video</h2>
  <video controls poster="https://via.placeholder.com/560x315.png?text=Poster" width="560">
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
    Trình duyệt của bạn không hỗ trợ video.
  </video>

  <h2>Audio</h2>
  <audio controls>
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio.
  </audio>

  <h2>SVG inline</h2>
  <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo đơn giản">
    <rect width="120" height="120" rx="16" fill="#0a74da" />
    <circle cx="60" cy="50" r="28" fill="#fff" />
  </svg>

</body>
</html>
