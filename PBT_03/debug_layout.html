<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Debug Layout</title>
  <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
  <h1>Debug Layout — two fixes demo</h1>

  <h2>Problematic (original)</h2>
  <div class="container original">
    <div class="sidebar">Sidebar</div>
    <div class="content">Content</div>
  </div>

  <h2>Fix 1 — use border-box</h2>
  <div class="container fix1">
    <div class="sidebar">Sidebar</div>
    <div class="content">Content</div>
  </div>

  <h2>Fix 2 — adjust widths (no border-box)</h2>
  <div class="container fix2">
    <div class="sidebar">Sidebar</div>
    <div class="content">Content</div>
  </div>

</body>
</html>
