<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flexbox Layout</title>
  <link rel="stylesheet" href="flexbox.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">ShopTLU</div>
    <ul class="menu">
      <li>Home</li>
      <li>Products</li>
      <li>About</li>
    </ul>
    <div class="actions"><button>Login</button><button>Register</button></div>
  </header>

  <main class="cards">
    <!-- create 8 cards -->
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product A</h3><p class="price">1.000.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product B</h3><p class="price">1.200.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product C</h3><p class="price">900.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product D</h3><p class="price">2.000.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product E</h3><p class="price">750.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product F</h3><p class="price">1.500.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product G</h3><p class="price">1.100.000đ</p><button class="buy">Mua</button></div>
    <div class="card"><img src="https://via.placeholder.com/300x180" alt=""><h3>Product H</h3><p class="price">1.300.000đ</p><button class="buy">Mua</button></div>
  </main>

</body>
</html>
