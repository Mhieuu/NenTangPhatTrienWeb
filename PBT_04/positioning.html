<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Positioning Playground</title>
  <link rel="stylesheet" href="positioning.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">ShopTLU</div>
    <nav class="nav"> <a href="#">Home</a> <a href="#">Products</a> <a href="#">About</a> </nav>
  </header>

  <div class="container">
    <aside class="sidebar">
      <h3>Filters</h3>
      <p>Sidebar content... (sticky)</p>
      <p style="height:1200px">Long content to enable scroll</p>
    </aside>

    <main class="main">
      <section class="products">
        <article class="card">
          <div class="badge">HOT</div>
          <h2>Product 1</h2>
          <p>Some description</p>
        </article>
        <article class="card">
          <div class="badge">HOT</div>
          <h2>Product 2</h2>
          <p>Some description</p>
        </article>
        <article class="card">
          <div class="badge">HOT</div>
          <h2>Product 3</h2>
          <p>Some description</p>
        </article>
      </section>
    </main>
  </div>

  <button class="to-top" aria-label="Back to top">↑</button>
</body>
</html>
